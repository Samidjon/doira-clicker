<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doira Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
    <h1>Player Profile</h1>

    <p><strong>Name:</strong> <span id="profileName"></span></p>
    <p><strong>Total Score:</strong> <span id="profileScore"></span></p>
    <p><strong>Rank:</strong> <span id="profileRank"></span></p>

    <h2>Doira Collection</h2>

    <div class="collection">
        <div>
            <img src="doira.png" class="collection-img">
            <p>Classic Doira</p>    
            <button onclick="selectDoira('doira.png')">Select</button>
        </div>

        <div>
            <img src="doira_gold.png" class="collection-img locked" id="goldImg">
            <p>Golden Doira</p>
            <button id="goldBtn" onclick="selectDoira('doira_gold.png')">Select</button>
        </div>

        <div>
            <img src="doira_ancient.png" class="collection-img locked" id="ancientImg">
            <p>Ancient Doira</p>
            <button id="ancientBtn" onclick="selectDoira('doira_ancient.png')">Select</button>
        </div>
    </div>

    <button onclick="playGame()">🎮 Play Game</button>
    <button onclick="logout()">Logout</button>
</div>

<script>
const username = localStorage.getItem("doira_username");
const score = Number(localStorage.getItem("doira_score")) || 0;

if (!username) {
    window.location.href = "login.html";
}

document.getElementById("profileName").textContent = username;
document.getElementById("profileScore").textContent = score;
document.getElementById("profileRank").textContent = getRank(score);

const goldUnlocked = localStorage.getItem("doira_gold_unlocked") === "true";
const ancientUnlocked = localStorage.getItem("doira_ancient_unlocked") === "true";

if (goldUnlocked) {
    document.getElementById("goldImg").classList.remove("locked");
    document.getElementById("goldBtn").disabled = false;
} else {
    document.getElementById("goldBtn").disabled = true;
    document.getElementById("goldBtn").textContent = "Unlock at 100";
}

if (ancientUnlocked) {
    document.getElementById("ancientImg").classList.remove("locked");
    document.getElementById("ancientBtn").disabled = false;
} else {
    document.getElementById("ancientBtn").disabled = true;
    document.getElementById("ancientBtn").textContent = "Unlock at 300";
}

function getRank(score) {
    if (score >= 500) {
        return "🥁 Doira Master";
    } else if (score >= 200) {
        return "⭐ Skilled Musician";
    } else if (score >= 100) {
        return "🎵 Beginner Performer";
    } else {
        return "🌱 New Learner";
    }
}

function selectDoira(imageName) {
    localStorage.setItem("current_doira", imageName);
    alert("Doira selected!");
}

function playGame() {
    window.location.href = "index.html";
}

function logout() {
    localStorage.removeItem("doira_username");
    window.location.href = "login.html";
}
</script>

</body>
</html>
