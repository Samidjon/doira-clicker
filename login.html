<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Daniel — Doira Adventure</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body class="login-page">

<main class="login-layout">

    <section class="login-card">

        <div class="avatar-wrapper">
            <img
                src="daniel.png"
                alt="Daniel chatbot avatar"
                class="daniel-avatar large-avatar"
            >

            <span class="online-indicator"></span>
        </div>

        <p class="small-label">YOUR CULTURAL GUIDE</p>

        <h1>Welcome to Doira Adventure</h1>

        <p class="login-description">
            Hello! My name is Daniel. I will guide you through the
            history, culture, sounds, and traditions of the Uzbek Doira.
        </p>

        <form id="loginForm" class="login-form">

            <label for="username">
                What should I call you?
            </label>

            <input
                type="text"
                id="username"
                maxlength="25"
                placeholder="Enter your name"
                autocomplete="name"
                required
            >

            <button type="submit" class="primary-button full-button">
                Start Adventure
                <span>→</span>
            </button>

        </form>

        <p class="privacy-text">
            Your name and game progress are saved only on this device.
        </p>

    </section>

</main>

<script src="script.js"></script>

</body>
</html>
